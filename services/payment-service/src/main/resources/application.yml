server:
  port: 8082
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    key-store: ${SERVER_SSL_KEY_STORE:}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
    client-auth: ${SERVER_SSL_CLIENT_AUTH:none}

spring:
  application:
    name: payment-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SECURITY_OAUTH2_ISSUER_URI:http://localhost:8180/realms/microservices}
          jwk-set-uri: ${SECURITY_OAUTH2_JWK_SET_URI:http://localhost:8180/realms/microservices/protocol/openid-connect/certs}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:payment_db}?sslmode=${DB_SSL_MODE:disable}
    username: ${DB_USER:payment_user}
    password: ${DB_PASSWORD:payment_password}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092,localhost:19093}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      ssl.truststore.location: ${KAFKA_SSL_TRUSTSTORE_LOCATION:}
      ssl.truststore.password: ${KAFKA_SSL_TRUSTSTORE_PASSWORD:}
      ssl.keystore.location: ${KAFKA_SSL_KEYSTORE_LOCATION:}
      ssl.keystore.password: ${KAFKA_SSL_KEYSTORE_PASSWORD:}
      ssl.key.password: ${KAFKA_SSL_KEY_PASSWORD:}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

app:
  kafka:
    group-id: payment-service-group
  security:
    internal:
      api-key: ${INTERNAL_SERVICE_API_KEY:internal-dev-key-change-me}
      trusted-sources: ${INTERNAL_TRUSTED_SOURCES:api-gateway,order-service,payment-service,notification-service}
    data:
      encryption-key: ${DATA_ENCRYPTION_KEY:0123456789abcdef0123456789abcdef}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka,http://localhost:8762/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  structured:
    format:
      console: json

resilience4j:
  circuitbreaker:
    instances:
      paymentGateway:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      paymentReadService:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
  retry:
    instances:
      paymentGateway:
        maxAttempts: 3
        waitDuration: 300ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      paymentReadService:
        maxAttempts: 2
        waitDuration: 200ms
  bulkhead:
    instances:
      paymentReadService:
        maxConcurrentCalls: 40
        maxWaitDuration: 200ms
  thread-pool-bulkhead:
    instances:
      paymentGateway:
        maxThreadPoolSize: 10
        coreThreadPoolSize: 5
        queueCapacity: 50
  timelimiter:
    instances:
      paymentGateway:
        timeoutDuration: 1s
