server:
  port: 8080
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    key-store: ${SERVER_SSL_KEY_STORE:}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE:PKCS12}

spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SECURITY_OAUTH2_ISSUER_URI:http://localhost:8180/realms/microservices}
          jwk-set-uri: ${SECURITY_OAUTH2_JWK_SET_URI:http://localhost:8180/realms/microservices/protocol/openid-connect/certs}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins:
              - http://localhost:3000
              - http://localhost:8080
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: order-service-route
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - RewritePath=/api/orders/?(?<segment>.*), /api/orders/${segment}
            - AddRequestHeader=X-Api-Version, 1
            - AddRequestHeader=X-Request-Source, api-gateway
            - AddResponseHeader=X-Response-Source, order-service
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                key-resolver: "#{@userKeyResolver}"

        - id: order-service-route-v1
          uri: lb://order-service
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - RewritePath=/api/v1/orders/?(?<segment>.*), /api/orders/${segment}
            - AddRequestHeader=X-Request-Source, api-gateway
            - AddRequestHeader=X-Api-Version, 1
            - AddResponseHeader=X-Response-Source, order-service
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                key-resolver: "#{@userKeyResolver}"

        - id: payment-service-route
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - RewritePath=/api/payments/?(?<segment>.*), /api/payments/${segment}
            - AddRequestHeader=X-Api-Version, 1
            - AddRequestHeader=X-Request-Source, api-gateway
            - AddResponseHeader=X-Response-Source, payment-service
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 15
                redis-rate-limiter.burstCapacity: 30
                key-resolver: "#{@userKeyResolver}"

        - id: payment-service-route-v1
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - RewritePath=/api/v1/payments/?(?<segment>.*), /api/payments/${segment}
            - AddRequestHeader=X-Request-Source, api-gateway
            - AddRequestHeader=X-Api-Version, 1
            - AddResponseHeader=X-Response-Source, payment-service
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 15
                redis-rate-limiter.burstCapacity: 30
                key-resolver: "#{@userKeyResolver}"

        - id: notification-service-route
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/notifications/?(?<segment>.*), /api/notifications/${segment}
            - AddRequestHeader=X-Api-Version, 1
            - AddRequestHeader=X-Request-Source, api-gateway
            - AddResponseHeader=X-Response-Source, notification-service
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"

        - id: notification-service-route-v1
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - RewritePath=/api/v1/notifications/?(?<segment>.*), /api/notifications/${segment}
            - AddRequestHeader=X-Request-Source, api-gateway
            - AddRequestHeader=X-Api-Version, 1
            - AddResponseHeader=X-Response-Source, notification-service
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka,http://localhost:8762/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}
  endpoint:
    health:
      show-details: always

logging:
  structured:
    format:
      console: json

app:
  security:
    internal:
      api-key: ${INTERNAL_SERVICE_API_KEY:internal-dev-key-change-me}
