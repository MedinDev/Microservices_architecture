server:
  port: 8083
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    key-store: ${SERVER_SSL_KEY_STORE:}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
    client-auth: ${SERVER_SSL_CLIENT_AUTH:none}

spring:
  application:
    name: notification-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SECURITY_OAUTH2_ISSUER_URI:http://localhost:8180/realms/microservices}
          jwk-set-uri: ${SECURITY_OAUTH2_JWK_SET_URI:http://localhost:8180/realms/microservices/protocol/openid-connect/certs}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/${DB_NAME:notification_db}?sslmode=${DB_SSL_MODE:disable}
    username: ${DB_USER:notification_user}
    password: ${DB_PASSWORD:notification_password}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:14}
      minimum-idle: ${DB_POOL_MIN_IDLE:4}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:180000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:900000}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:20000}
      leak-detection-threshold: ${DB_POOL_LEAK_DETECTION_MS:45000}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate.default_batch_fetch_size: 50
      hibernate.jdbc.batch_size: 50
      hibernate.order_inserts: true
      hibernate.order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092,localhost:19093}
    producer:
      batch-size: ${KAFKA_PRODUCER_BATCH_SIZE:65536}
      compression-type: ${KAFKA_PRODUCER_COMPRESSION:lz4}
      properties:
        linger.ms: ${KAFKA_PRODUCER_LINGER_MS:10}
    consumer:
      max-poll-records: ${KAFKA_CONSUMER_MAX_POLL_RECORDS:200}
      fetch-min-size: ${KAFKA_CONSUMER_FETCH_MIN_BYTES:1024}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      ssl.truststore.location: ${KAFKA_SSL_TRUSTSTORE_LOCATION:}
      ssl.truststore.password: ${KAFKA_SSL_TRUSTSTORE_PASSWORD:}
      ssl.keystore.location: ${KAFKA_SSL_KEYSTORE_LOCATION:}
      ssl.keystore.password: ${KAFKA_SSL_KEYSTORE_PASSWORD:}
      ssl.key.password: ${KAFKA_SSL_KEY_PASSWORD:}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  kafka:
    group-id: notification-service-group
    listener:
      concurrency: ${KAFKA_LISTENER_CONCURRENCY:4}
    topic:
      partitions: ${KAFKA_TOPIC_PARTITIONS:6}
      replication-factor: ${KAFKA_TOPIC_REPLICATION_FACTOR:2}
      retention-ms: ${KAFKA_TOPIC_RETENTION_MS:604800000}
  lifecycle:
    read-notification-retention-days: ${NOTIFICATION_READ_RETENTION_DAYS:30}
    processed-event-retention-days: ${NOTIFICATION_PROCESSED_EVENT_RETENTION_DAYS:30}
    cleanup-cron: ${NOTIFICATION_CLEANUP_CRON:0 20 3 * * *}
  security:
    internal:
      api-key: ${INTERNAL_SERVICE_API_KEY:internal-dev-key-change-me}
      trusted-sources: ${INTERNAL_TRUSTED_SOURCES:api-gateway,order-service,payment-service,notification-service}
    data:
      encryption-key: ${DATA_ENCRYPTION_KEY:0123456789abcdef0123456789abcdef}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka,http://localhost:8762/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  structured:
    format:
      console: json
  logback:
    rollingpolicy:
      max-file-size: ${LOG_MAX_FILE_SIZE:25MB}
      max-history: ${LOG_MAX_HISTORY:10}
      total-size-cap: ${LOG_TOTAL_SIZE_CAP:1GB}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
