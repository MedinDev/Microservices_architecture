groups:
  - name: service-health-alerts
    rules:
      - alert: ServiceDown
        expr: up{job=~"service-registry|api-gateway|business-services"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Service instance down
          description: "{{ $labels.instance }} in job {{ $labels.job }} has been down for more than 2 minutes."

      - alert: HighHttpErrorRate
        expr: (sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (application) / sum(rate(http_server_requests_seconds_count[5m])) by (application)) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: High HTTP 5xx error rate
          description: "{{ $labels.application }} has error ratio above 5% for 5 minutes."

      - alert: HighRequestLatencyP95
        expr: histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le, application)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: High request latency p95
          description: "{{ $labels.application }} p95 latency is above 1 second."

      - alert: KafkaConsumerLagHigh
        expr: kafka_consumergroup_lag_sum > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Kafka consumer lag high
          description: "Consumer group {{ $labels.consumergroup }} lag is {{ $value }} on topic {{ $labels.topic }}."

      - alert: HighDbPoolUsage
        expr: (hikaricp_connections_active / hikaricp_connections_max) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: High database pool usage
          description: "{{ $labels.application }} DB pool usage is above 90%."

      - alert: CircuitBreakerOpen
        expr: resilience4j_circuitbreaker_state{state="open"} == 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Circuit breaker open
          description: "Circuit breaker {{ $labels.name }} is open in {{ $labels.application }}."
