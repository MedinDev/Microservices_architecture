global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: service-registry
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - service-registry-1:8761
          - service-registry-2:8761

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api-gateway:8080

  - job_name: business-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - order-service:8081
          - payment-service:8082
          - notification-service:8083

  - job_name: kafka-exporter
    static_configs:
      - targets:
          - kafka-exporter:9308
